plugins {
    id 'java-library'
    id 'maven-publish'
}

description = 'IDEA upstream integration library for Pyloros'

java {
    withSourcesJar()
    withJavadocJar()
}

dependencies {
    api project(':pyloros-server')

    implementation "io.vertx:vertx-core:${vertxVersion}"
    implementation "io.vertx:vertx-web-client:${vertxVersion}"
    implementation "org.slf4j:slf4j-api:${slf4jVersion}"
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java

            pom {
                name = 'pyloros-upstream-idea'
                description = project.description
                url = 'https://github.com/aresstack/pyloros'

                licenses {
                    license {
                        name = 'The Apache License, Version 2.0'
                        url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        distribution = 'repo'
                    }
                }

                developers {
                    developer {
                        id = 'aresstack'
                        name = 'Ares Stack'
                    }
                }

                scm {
                    connection = 'scm:git:https://github.com/aresstack/pyloros.git'
                    developerConnection = 'scm:git:ssh://git@github.com:aresstack/pyloros.git'
                    url = 'https://github.com/aresstack/pyloros'
                }
            }
        }
    }
}

