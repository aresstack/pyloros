server.port=8081
public.origin=https://current-car.com
mcp.public.path=/sse

oauth.client.id=angel
oauth.client.secret=change-me
oauth.access-token.ttl.seconds=3600
oauth.refresh-token.ttl.seconds=2592000
oauth.refresh-token.rotation.enabled=false
oauth.refresh-token.store.path=data/oauth-refresh-tokens.json
# Environment variables override these values when present.

idea.mcp.host=127.0.0.1
idea.mcp.port=64343
idea.mcp.sse.path=/sse
idea.mcp.enabled=true
idea.mcp.connect.timeout.ms=3000
idea.mcp.response.timeout.ms=60000
idea.mcp.tool.prefix=idea__

# GitHub MCP upstream (disabled by default; set GITHUB_MCP_ENABLED=true and GITHUB_MCP_TOKEN env var to enable)
github.mcp.enabled=false
github.mcp.url=https://api.githubcopilot.com/mcp/
github.mcp.tool.prefix=github/
github.mcp.connect.timeout.ms=5000
github.mcp.response.timeout.ms=60000
# github.mcp.token must not be set here; use GITHUB_MCP_TOKEN environment variable

