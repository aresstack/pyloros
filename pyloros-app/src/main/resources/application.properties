server.port=8081
public.origin=https://current-car.com
mcp.public.path=/sse

oauth.client.id=angel
oauth.client.secret=change-me
oauth.access-token.ttl.seconds=3600
oauth.refresh-token.ttl.seconds=2592000
oauth.refresh-token.rotation.enabled=false
oauth.refresh-token.store.path=data/oauth-refresh-tokens.json
# Environment variables override these values when present.

idea.mcp.host=127.0.0.1
idea.mcp.port=64343
idea.mcp.sse.path=/sse
idea.mcp.enabled=true
idea.mcp.connect.timeout.ms=3000
idea.mcp.response.timeout.ms=60000
idea.mcp.tool.prefix=idea__

# Generic MCP upstreams
pyloros.upstream.github.enabled=false
pyloros.upstream.github.transport=streamable-http
pyloros.upstream.github.url=https://api.githubcopilot.com/mcp/
pyloros.upstream.github.prefix=github/
pyloros.upstream.github.authorization-env=GITHUB_MCP_TOKEN
pyloros.upstream.github.connect.timeout.ms=5000
pyloros.upstream.github.response.timeout.ms=60000

pyloros.upstream.intellij-index.enabled=false
pyloros.upstream.intellij-index.transport=streamable-http
pyloros.upstream.intellij-index.url=http://127.0.0.1:29170/index-mcp/streamable-http
pyloros.upstream.intellij-index.prefix=intellij-index/
pyloros.upstream.intellij-index.connect.timeout.ms=3000
pyloros.upstream.intellij-index.response.timeout.ms=60000

# Legacy GitHub keys kept for backward compatibility
github.mcp.enabled=false
github.mcp.url=https://api.githubcopilot.com/mcp/
github.mcp.tool.prefix=github/
github.mcp.connect.timeout.ms=5000
github.mcp.response.timeout.ms=60000
